[package]
name = "ngdev-laravel"
version = "0.1.0"
edition = "2021"
description = "Ng Development - Laravel PHP code generator"

[[bin]]
name = "ngdev"
path = "src/main.rs"

[dependencies]
tera = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
heck = "0.5"
anyhow = "1"
dialoguer = "0.11"
console = "0.15"
