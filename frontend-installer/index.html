<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>caronte Manager</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="bg-base-100 text-base-content min-h-screen">

    <!-- ── Layout principal ──────────────────────────────────────────────── -->
    <div class="drawer lg:drawer-open min-h-screen">
      <input id="sidebar-toggle" type="checkbox" class="drawer-toggle" />

      <!-- Conteúdo -->
      <div class="drawer-content flex flex-col">

        <!-- Topbar (mobile) -->
        <div class="navbar bg-base-300 lg:hidden">
          <label for="sidebar-toggle" class="btn btn-square btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 class="inline-block w-5 h-5 stroke-current">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </label>
          <span class="text-lg font-bold ml-2">caronte Manager</span>
        </div>

        <!-- Área de conteúdo dinâmico -->
        <main id="main-content" class="flex-1 p-6">
          <!-- Renderizado pelo main.ts -->
        </main>

      </div>

      <!-- Sidebar -->
      <div class="drawer-side z-40">
        <label for="sidebar-toggle" class="drawer-overlay"></label>
        <aside class="bg-base-200 w-64 min-h-full flex flex-col">

          <!-- Logo -->
          <div class="p-4 border-b border-base-300">
            <h1 class="text-xl font-bold text-primary">⚡ caronte</h1>
            <p class="text-xs text-base-content/60 mt-1">Laravel Generator Manager</p>
          </div>

          <!-- Nav -->
          <ul class="menu menu-sm flex-1 p-3 gap-1" id="sidebar-nav">
            <li class="menu-title"><span>Geradores</span></li>
            <li><a data-page="context"   class="nav-link">🏗 Context DDD</a></li>
            <li><a data-page="docker"    class="nav-link">🐳 Docker</a></li>
            <li><a data-page="pdv"       class="nav-link">🧾 PDV</a></li>
            <li><a data-page="estoque"   class="nav-link">📦 Estoque</a></li>
            <li><a data-page="logistica" class="nav-link">🔄 Logística Reversa</a></li>
            <li><a data-page="landing"   class="nav-link">🌐 Landing Page</a></li>

            <li class="menu-title mt-3"><span>Artesanal</span></li>
            <li><a data-page="controller" class="nav-link">🎮 Controller</a></li>
            <li><a data-page="model"      class="nav-link">🗃 Model</a></li>
            <li><a data-page="migration"  class="nav-link">📋 Migration</a></li>
          </ul>

          <!-- Rodapé da sidebar -->
          <div class="p-3 border-t border-base-300 text-xs text-base-content/40">
            v0.1.0 — Tauri + Tailwind
          </div>

        </aside>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
